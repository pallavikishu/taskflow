version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: taskflow-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: taskflow-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGODB_URI: mongodb://mongodb:27017/taskflow
      JWT_SECRET: ${JWT_SECRET:-c2VjcmV0LWtleS1mb3ItdGFza2Zsb3ctYXBwLWNoYW5nZS1pbi1wcm9kdWN0aW9uLW1ha2UtbG9uZ2Vy}
      JWT_EXPIRATION_MS: 86400000
      FRONTEND_ORIGIN: http://localhost:5173
      PORT: 8080
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080/api
    container_name: taskflow-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mongo-data:
